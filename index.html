<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#94bbd9">
  <meta name="description" content="memyo Lernwelt – Lernen, üben und spielen in deinem Tempo.">
  <title>memyo Lernwelt</title>
  <link rel="manifest" href="manifest.webmanifest?v=15?v=15">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="backButton" class="icon-button hidden" type="button" aria-label="Zurück">←</button>
      <button id="brandButton" class="brand" type="button" aria-label="Zur Startseite">
        <span class="flower" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i><b></b>
        </span>
        <span>
          <strong>memyo</strong>
          <small>Lernwelt</small>
        </span>
      </button>
      <div class="topbar-actions"><button id="installButton" class="soft-button hidden" type="button">Installieren</button><button id="profileButton" class="profile-chip" type="button" aria-label="Schulprofil wählen"></button></div>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer>
      <span>Verstehen. Üben. Spielen.</span>
      <button id="resetButton" class="text-button" type="button">Fortschritt zurücksetzen</button>
    </footer>
  </div>

  <div id="bowlingOverlay" class="bowling-overlay" aria-live="polite" aria-hidden="true">
    <div class="bowling-card">
      <p class="hit-label">Richtig – dein Wurf!</p>
      <div class="lane">
        <div class="ball"></div>
        <div class="pins" aria-hidden="true">
          <span class="pin p1"></span>
          <span class="pin p2"></span>
          <span class="pin p3"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="profileOverlay" class="profile-overlay hidden" aria-hidden="true"></div>

  <script src="app.js?v=15" defer></script>
</body>
</html>
